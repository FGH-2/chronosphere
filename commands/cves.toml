category = "cves"
display_name = "CVEs"
icon = "󰒓"
order = 60

# Catalog of "go-to" CVE workflows that map to runnable commands. Use this as a
# launchpad: many entries reference public PoC repos / nuclei templates and tell
# you what to set before firing.

# === Nuclei: the broadest "fast CVE check" net ===

[[command]]
id = "cve.nuclei.cves"
title = "nuclei — http CVE templates"
template = "nuclei -u http://{target} -t /root/nuclei-templates/http/cves/ -severity high,critical -stats"
requires = ["nuclei"]
tags = ["nuclei", "scan", "fast"]

[[command]]
id = "cve.nuclei.recent"
title = "nuclei — last 30 days only"
template = "nuclei -u http://{target} -t /root/nuclei-templates/http/cves/ -newer 30d -severity medium,high,critical"
requires = ["nuclei"]
tags = ["nuclei", "scan", "recent"]

[[command]]
id = "cve.nuclei.bytags"
title = "nuclei — tagged (e.g. wordpress, gitlab, atlassian)"
template = "nuclei -u http://{target} -tags wordpress,gitlab,atlassian,confluence,jenkins,nextjs -severity medium,high,critical"
requires = ["nuclei"]
tags = ["nuclei", "tags"]

[[command]]
id = "cve.nuclei.update"
title = "nuclei — update templates"
template = "nuclei -update-templates"
requires = ["nuclei"]
tags = ["nuclei", "update"]

# === searchsploit + exploitdb ===

[[command]]
id = "cve.searchsploit.banner"
title = "searchsploit — search by service banner"
template = "echo 'paste banner here' | searchsploit --nmap"
requires = ["searchsploit"]
tags = ["exploitdb", "lookup"]

[[command]]
id = "cve.searchsploit.term"
title = "searchsploit — search by term"
template = "searchsploit nextjs"
requires = ["searchsploit"]
tags = ["exploitdb", "lookup"]

[[command]]
id = "cve.searchsploit.copy"
title = "searchsploit -m (copy exploit locally)"
template = "searchsploit -m EDB_ID -o ."
requires = ["searchsploit"]
tags = ["exploitdb", "fetch"]

# === Metasploit ===

[[command]]
id = "cve.msf.console"
title = "msfconsole (interactive)"
template = "msfconsole -q"
requires = ["msfconsole"]
tags = ["metasploit"]
interactive = true

[[command]]
id = "cve.msf.check_only"
title = "msf one-shot: check module"
template = "msfconsole -q -x 'use auxiliary/scanner/MODULE; set RHOSTS {target}; check; exit'"
requires = ["msfconsole"]
tags = ["metasploit", "check"]

# === GitHub PoC discovery (curated repos) ===

[[command]]
id = "cve.github.trickest"
title = "trickest/cve — CVE→PoC mapping (clone once)"
template = "git clone --depth 1 https://github.com/trickest/cve /opt/cve-trickest"
requires = ["git"]
tags = ["cve", "github", "stash"]

[[command]]
id = "cve.github.nomisec"
title = "nomi-sec/PoC-in-GitHub — daily-updated PoC index"
template = "git clone --depth 1 https://github.com/nomi-sec/PoC-in-GitHub /opt/cve-poc-github"
requires = ["git"]
tags = ["cve", "github", "stash"]

[[command]]
id = "cve.search.local"
title = "grep local CVE index"
template = "grep -ril 'CVE-2024' /opt/cve-trickest /opt/cve-poc-github 2>/dev/null | head -30"
requires = ["grep"]
tags = ["cve", "search"]

# === chronosphere local CVE index ===

[[command]]
id = "cve.chrono.sync"
title = "chronosphere — sync local CVE index (incremental)"
template = "chronosphere cve sync"
requires = ["chronosphere"]
tags = ["cve", "sync", "nvd"]

[[command]]
id = "cve.chrono.sync.month"
title = "chronosphere — sync one month via NVD API"
template = "chronosphere cve sync --month 2026-05"
requires = ["chronosphere"]
tags = ["cve", "sync", "nvd"]

[[command]]
id = "cve.chrono.sync.full"
title = "chronosphere — full CVE sync (2024-2026)"
template = "chronosphere cve sync --full --years 2024-2026"
requires = ["chronosphere"]
tags = ["cve", "sync", "nvd"]

[[command]]
id = "cve.chrono.search"
title = "chronosphere — search local CVE index"
template = "chronosphere cve search nginx rce --limit 20"
requires = ["chronosphere"]
tags = ["cve", "search"]

[[command]]
id = "cve.chrono.search.kev"
title = "chronosphere — list KEV entries locally"
template = "chronosphere cve search --kev --limit 30"
requires = ["chronosphere"]
tags = ["cve", "search", "kev"]

[[command]]
id = "cve.chrono.status"
title = "chronosphere — CVE database status"
template = "chronosphere cve status"
requires = ["chronosphere"]
tags = ["cve", "status"]

[[command]]
id = "cve.chrono.fetch"
title = "chronosphere — fetch single CVE on demand"
template = "chronosphere cve fetch CVE-2026-9256 --enrich"
requires = ["chronosphere"]
tags = ["cve", "fetch"]

# === NVD feed (legacy curl) ===

[[command]]
id = "cve.nvd.fetch_year"
title = "Fetch NVD JSON feed for a year"
template = "curl -fsSL -o nvd-2025.json.gz https://nvd.nist.gov/feeds/json/cve/1.1/nvdcve-1.1-2025.json.gz && gunzip nvd-2025.json.gz"
requires = ["curl", "gunzip"]
tags = ["nvd", "feed"]

[[command]]
id = "cve.nvd.search_local"
title = "Local NVD: jq filter by product"
template = "jq '.CVE_Items[] | select(.cve.description.description_data[0].value | test(\"nextjs|next.js\"; \"i\")) | .cve.CVE_data_meta.ID' nvd-2025.json | head -20"
requires = ["jq"]
tags = ["nvd", "query"]

