# === Username harvesting (organized output) ===

[[command]]
id = "smb.harvest.rpcclient_users"
title = "rpcclient → users.txt (parsed sAMAccountNames)"
template = """rpcclient -U '{smb_user_spec}' {target} -c 'enumdomusers' 2>/dev/null \\
 | grep 'user:' | awk -F'[][]' '{print $2}' | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["rpcclient"]
tags = ["harvest", "users", "output"]

[[command]]
id = "smb.harvest.nxc_users"
title = "nxc smb --users → users.txt"
template = """nxc smb {target} {nxc_auth} --users 2>/dev/null \\
 | awk '/\\\\/ {print $NF}' | cut -d'\\\\' -f2 | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["nxc"]
tags = ["harvest", "users", "output", "nxc"]

[[command]]
id = "smb.harvest.nxc_ridbrute_users"
title = "nxc smb --rid-brute → users.txt"
template = """nxc smb {target} {nxc_auth} --rid-brute 2>/dev/null \\
 | awk '/SidTypeUser/ {print $NF}' | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["nxc"]
tags = ["harvest", "users", "output", "nxc", "rid"]

[[command]]
id = "smb.harvest.lookupsid_users"
title = "impacket-lookupsid → users.txt"
template = """impacket-lookupsid '{user_at_domain}:{password}@{target}' 20000 2>/dev/null \\
 | grep 'SidTypeUser' | awk '{print $2}' | cut -d'\\\\' -f2 | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["impacket-lookupsid"]
tags = ["harvest", "users", "output", "rid"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.harvest.lookupsid_null"
title = "impacket-lookupsid (null) → users.txt"
template = """impacket-lookupsid {target}/anonymous@{target} 20000 2>/dev/null \\
 | grep 'SidTypeUser' | awk '{print $2}' | cut -d'\\\\' -f2 | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["impacket-lookupsid"]
tags = ["harvest", "users", "output", "rid", "unauth"]

[[command]]
id = "smb.harvest.enum4linux_users"
title = "enum4linux-ng JSON → users.txt"
template = """enum4linux-ng -U {target} -oJ /tmp/e4l_{target} \\
 && jq -r '.users[].username // empty' /tmp/e4l_{target}/*.json 2>/dev/null | sort -u > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["enum4linux-ng", "jq"]
tags = ["harvest", "users", "output"]

[[command]]
id = "smb.harvest.combined"
title = "Multi-source user harvest → users.txt"
template = """mkdir -p loot && : > loot/all_users.txt \\
 && (rpcclient -U '{smb_user_spec}' {target} -c 'enumdomusers' 2>/dev/null | grep 'user:' | awk -F'[][]' '{print $2}') >> loot/all_users.txt \\
 && (nxc smb {target} {nxc_auth} --users 2>/dev/null | awk '/\\\\/ {print $NF}' | cut -d'\\\\' -f2) >> loot/all_users.txt \\
 && (nxc smb {target} {nxc_auth} --rid-brute 2>/dev/null | awk '/SidTypeUser/ {print $NF}') >> loot/all_users.txt \\
 && sort -u loot/all_users.txt > {userlist} \\
 && wc -l {userlist} && head {userlist}"""
requires = ["rpcclient", "nxc"]
tags = ["harvest", "users", "output", "chain"]

