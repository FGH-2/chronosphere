# === rpcclient ===

[[command]]
id = "smb.rpcclient.unauth"
title = "rpcclient — enum users/groups/info (null session)"
template = "rpcclient -U '' -N {target} -c 'enumdomusers;enumdomgroups;querydominfo'"
requires = ["rpcclient"]
tags = ["enum", "rpc", "unauth"]

[[command]]
id = "smb.rpcclient.authed"
title = "rpcclient — enum users/groups/info (authenticated)"
template = "rpcclient -U '{user}%{password}' {target} -c 'enumdomusers;enumdomgroups;querydominfo'"
requires = ["rpcclient"]
tags = ["enum", "rpc", "authed"]
when = "creds.kind == 'plaintext'"

[[command]]
id = "smb.rpcclient.srvinfo"
title = "rpcclient — srvinfo + netshareenum"
template = "rpcclient -U '{smb_user_spec}' {target} -c 'srvinfo;netshareenumall'"
requires = ["rpcclient"]
tags = ["enum", "rpc", "shares"]

[[command]]
id = "smb.rpcclient.lookupnames"
title = "rpcclient — lookupnames (SID → name)"
template = "rpcclient -U '{smb_user_spec}' {target} -c 'lookupnames S-1-5-21-0-0-0-500'"
requires = ["rpcclient"]
tags = ["enum", "rpc", "rid"]

[[command]]
id = "smb.rpcclient.getdompwinfo"
